<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Prediction Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="result-card {{ status }}">

        {% if status == "approved" %}

            <h1>✅ Loan Approved</h1>

        {% else %}

            <h1>❌ Loan Rejected</h1>

        {% endif %}

        <hr>

        <h2>
            Approval Confidence :
            <strong>{{ approval_confidence }}%</strong>
        </h2>

        <h2>
            Rejection Risk :
            <strong>{{ rejection_risk }}%</strong>
        </h2>

    </div>

    <div class="button">

        <a href="{{ url_for('home') }}">
            <button type="button">
                🔄 Predict Another Loan
            </button>
        </a>

    </div>

</div>

</body>

</html>
